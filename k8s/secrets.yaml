# secrets.yaml — TEMPLATE
#
# Los valores deben estar en base64. Para codificar:
#   echo -n "mi_valor" | base64
#
# NUNCA commitear este archivo con valores reales.
# En CI/CD los secrets se inyectan desde el vault del repositorio
# (GitHub Secrets, GitLab CI Variables, etc.)
#
# Aplicar con:
#   kubectl apply -f k8s/secrets.yaml -n restaurantes
apiVersion: v1
kind: Secret
metadata:
  name: restaurantes-secrets
  namespace: restaurantes
type: Opaque
data:
  # Postgres
  DB_USER:     YWRtaW4=
  DB_PASSWORD: YWRtaW4=

  # Keycloak admin
  KEYCLOAK_ADMIN:          YWRtaW4=
  KEYCLOAK_ADMIN_PASSWORD: YWRtaW4=

  # Keycloak client
  KEYCLOAK_CLIENT_ID:     YXBpLXJlc3RhdXJhbnQ=
  KEYCLOAK_CLIENT_SECRET: YXBpLXJlc3RhdXJhbnQtc2VjcmV0