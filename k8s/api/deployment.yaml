# api/deployment.yaml
#
# Para pruebas locales con minikube:
#   1. Apuntar Docker al daemon de minikube:
#        & minikube docker-env --shell powershell | Invoke-Expression
#   2. Construir con el nombre exacto de abajo:
#        docker build -t restaurantes/api:latest ./api
#   3. imagePullPolicy: Never para usar imagen local
#
# Para producción (CI/CD publica a ghcr.io):
#   Cambiar image a ghcr.io/ORG/REPO/api:latest
#   Cambiar imagePullPolicy a Always
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: restaurantes
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:       1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: restaurantes/api:latest
          imagePullPolicy: Never   # Usa imagen local — cambiar a Always con registry real
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: restaurantes-config
            - secretRef:
                name: restaurantes-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu:    "100m"
              memory: "128Mi"
            limits:
              cpu:    "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: restaurantes
spec:
  selector:
    app: api
  ports:
    - protocol: TCP
      port:       80
      targetPort: 3000
  type: ClusterIP