# nginx/nginx.mongo.conf
#
# Balanceador de carga para el stack con MongoDB.
#
# Rutas:
#   /api/**    → upstream api    (instancias del microservicio principal)
#   /search/** → upstream search (instancias del microservicio de búsqueda)
#
# Para escalar:
#   docker compose -f docker-compose.mongo.yml up --scale api=3 --scale search=2
# Nginx distribuye automáticamente con round-robin entre las instancias.

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  # ── Upstream API principal ────────────────────────────────────────
  # Docker Compose resuelve "api" como todos los contenedores con ese nombre.
  # round-robin es el algoritmo por defecto.
  upstream api_backend {
    server api:3000;
    # Al escalar con --scale api=N, Docker añade las IPs automáticamente.
    keepalive 32;
  }

  # ── Upstream Search ───────────────────────────────────────────────
  upstream search_backend {
    server search:4000;
    keepalive 16;
  }

  server {
    listen 80;
    server_name localhost;

    # Timeouts razonables
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    # Headers que se reenvían al backend
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── /api/** → microservicio principal ─────────────────────────
    location /api/ {
      proxy_pass http://api_backend;
    }

    # ── /search/** → microservicio de búsqueda ────────────────────
    location /search/ {
      proxy_pass http://search_backend/;
    }

    # ── Health check de Nginx ─────────────────────────────────────
    location /health {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }
  }
}