services:

  # ── PostgreSQL — BD principal ─────────────────────────────────────
  db_api:
    image: postgres:16
    container_name: db_api
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${RESTAURANT_DB}
    ports:
      - "5435:5432"
    volumes:
      - pgdata_api:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${RESTAURANT_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── PostgreSQL — BD de Keycloak ───────────────────────────────────
  db_keycloak:
    image: postgres:16
    container_name: db_keycloak
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${KEYCLOAK_DB}
    ports:
      - "5433:5432"
    volumes:
      - pgdata_keycloak:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${KEYCLOAK_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Keycloak ──────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    depends_on:
      db_keycloak:
        condition: service_healthy
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db_keycloak:5432/${KEYCLOAK_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME: localhost          
      KC_HOSTNAME_PORT: 8080          
      KC_HOSTNAME_STRICT: "false"       
      KC_HTTP_ENABLED: "true"      
      KC_HEALTH_ENABLED: "true"     

      KC_IMPORT: /opt/keycloak/data/import/realm-export.json
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json  
    command: ["start-dev", "--import-realm"]
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/realms/master || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s

  # ── Redis ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru 
    volumes:
      # Persiste los datos de Redis aunque el contenedor se reinicie
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ElasticSearch ─────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── API principal (escalable horizontalmente) ─────────────────────
  # Para escalar: docker compose -f docker-compose.postgres.yml up --scale api=3
  api:
    build: ./api
    # container_name: api
    depends_on:
      db_api:
        condition: service_healthy
      keycloak:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      DB_HOST: ${DB_HOST:-db_api}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${POSTGRES_USER:-admin}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      DB_NAME: ${RESTAURANT_DB:-restaurantdb}
      DB_ENGINE: ${DB_ENGINE:-postgres}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      REALM: ${REALM:-restaurant}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-api-restaurant}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-api-restaurant-secret}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-admin-cli}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      # Sin ports: Nginx es el punto de entrada
   # ports:
   #   - "3000:3000"

  # ── Microservicio de búsqueda ElasticSearch ───────────────────────
  # Para escalar: docker compose -f docker-compose.postgres.yml up --scale search=2
  search:
    build: ./search-service
   # container_name: search
    depends_on:
      elasticsearch:
        condition: service_healthy
      db_api:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ELASTIC_URL: http://elasticsearch:9200
      DB_ENGINE: ${DB_ENGINE:-postgres}
      DB_HOST: ${DB_HOST:-db_api}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${RESTAURANT_DB}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    # Sin ports: Nginx enruta /search/** aquí
    # ports:
    #   - "4000:4000"

  # ── Nginx — Balanceador de carga ──────────────────────────────────
  nginx:
    image: nginx:alpine
   # container_name: nginx
    depends_on:
      - api
      - search
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.postgres.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata_api:
  pgdata_keycloak:
  redis_data:
  es_data: 