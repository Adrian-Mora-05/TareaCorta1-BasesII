services:

  # ════════════════════════════════════════════════════════════════
  #  CONFIG SERVERS — guardan los metadatos del cluster sharded
  #  (qué chunks están en qué shard)
  #  Se despliegan como replica set propio llamado 'configReplSet'
  # ════════════════════════════════════════════════════════════════
  configsvr1:
    image: mongo:7
    container_name: configsvr1
    command: mongod --configsvr --replSet configReplSet --bind_ip_all --port 27017
    volumes:
      - configsvr1_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
 
  configsvr2:
    image: mongo:7
    container_name: configsvr2
    command: mongod --configsvr --replSet configReplSet --bind_ip_all --port 27017
    volumes:
      - configsvr2_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
 
  configsvr3:
    image: mongo:7
    container_name: configsvr3
    command: mongod --configsvr --replSet configReplSet --bind_ip_all --port 27017
    volumes:
      - configsvr3_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ════════════════════════════════════════════════════════════════
  #  SHARD 1 — Replica set rs0 (1 primario + 2 secundarios)
  #  Aquí viven los datos particionados de pedidos y reservaciones.
  #  El enunciado pide al menos 1 shard — este es el shard1.
  # ════════════════════════════════════════════════════════════════
  shard1-primary:
    image: mongo:7
    container_name: shard1-primary
    command: mongod --shardsvr --replSet rs0 --bind_ip_all --port 27017
    volumes:
      - shard1_primary_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
 
  shard1-secondary1:
    image: mongo:7
    container_name: shard1-secondary1
    command: mongod --shardsvr --replSet rs0 --bind_ip_all --port 27017
    volumes:
      - shard1_secondary1_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
 
  shard1-secondary2:
    image: mongo:7
    container_name: shard1-secondary2
    command: mongod --shardsvr --replSet rs0 --bind_ip_all --port 27017
    volumes:
      - shard1_secondary2_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
 
  # ════════════════════════════════════════════════════════════════
  #  MONGOS — Router de queries
  #  La API y el search service se conectan SOLO a mongos.
  #  Mongos decide a qué shard enviar cada operación según la shard key.
  # ════════════════════════════════════════════════════════════════
  mongos:
    image: mongo:7
    container_name: mongos
    command: >
      mongos
      --configdb configReplSet/configsvr1:27017,configsvr2:27017,configsvr3:27017
      --bind_ip_all
      --port 27017
    ports:
      - "27017:27017"
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "mongosh", "--port", "27017", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10


  # ════════════════════════════════════════════════════════════════
  #  INIT JOB — inicializa configsvr, shard rs0 y configura sharding
  #  Corre una sola vez y termina (restart: "no")
  # ════════════════════════════════════════════════════════════════
  mongo-init:
    image: mongo:7
    container_name: mongo-init
    depends_on:
      configsvr1:
        condition: service_healthy
      configsvr2:
        condition: service_healthy
      configsvr3:
        condition: service_healthy
      shard1-primary:
        condition: service_healthy
      shard1-secondary1:
        condition: service_healthy
      shard1-secondary2:
        condition: service_healthy
    entrypoint: >
      bash -c "
        set -e
 
        echo '=== 1. Inicializando Config Server Replica Set ===' &&
        mongosh --host configsvr1:27017 --eval '
          rs.initiate({
            _id: \"configReplSet\",
            configsvr: true,
            members: [
              { _id: 0, host: \"configsvr1:27017\" },
              { _id: 1, host: \"configsvr2:27017\" },
              { _id: 2, host: \"configsvr3:27017\" }
            ]
          })
        ' &&
        sleep 5 &&
 
        echo '=== 2. Inicializando Shard rs0 ===' &&
        mongosh --host shard1-primary:27017 --eval '
          rs.initiate({
            _id: \"rs0\",
            members: [
              { _id: 0, host: \"shard1-primary:27017\",    priority: 2 },
              { _id: 1, host: \"shard1-secondary1:27017\", priority: 1 },
              { _id: 2, host: \"shard1-secondary2:27017\", priority: 1 }
            ]
          })
        ' &&
        sleep 10 &&
 
        echo '=== 3. Iniciando mongos temporalmente para configurar sharding ===' &&
        mongos --configdb configReplSet/configsvr1:27017,configsvr2:27017,configsvr3:27017 --port 27020 --fork --logpath /tmp/mongos.log &&
        sleep 5 &&
 
        echo '=== 4. Registrando el shard en mongos ===' &&
        mongosh --port 27020 --eval '
          sh.addShard(\"rs0/shard1-primary:27017,shard1-secondary1:27017,shard1-secondary2:27017\")
        ' &&
 
        echo '=== 5. Habilitando sharding en la base de datos ===' &&
        mongosh --port 27020 --eval '
          sh.enableSharding(\"restaurantdb\")
        ' &&
 
        echo '=== 6. Configurando shard keys en colecciones clave ===' &&
        mongosh --port 27020 --eval '
          // Pedidos particionados por restaurante (hashed = distribución uniforme)
          sh.shardCollection(\"restaurantdb.pedidos\", { id_restaurante: \"hashed\" });
 
          // Reservaciones particionadas por restaurante
          sh.shardCollection(\"restaurantdb.reservaciones\", { id_restaurante: \"hashed\" });
 
          // Índices de soporte para queries frecuentes
          db.getSiblingDB(\"restaurantdb\").pedidos.createIndex({ id_restaurante: 1, createdAt: -1 });
          db.getSiblingDB(\"restaurantdb\").reservaciones.createIndex({ id_restaurante: 1, fecha: 1 });
          db.getSiblingDB(\"restaurantdb\").menus.createIndex({ id_restaurante: 1 });
 
          print(\"Sharding configurado correctamente\");
        ' &&
 
        echo '=== mongo-init completado ==='
      "
    restart: "no"


  # ── Keycloak ──────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_ENABLED: "true"
      KC_IMPORT: ${KC_IMPORT:-/opt/keycloak/data/import/realm-export.json}
      KC_HOSTNAME: ${KC_HOSTNAME:-localhost}
      KC_HOSTNAME_PORT: ${KC_HOSTNAME_PORT:-8080}
      KC_HOSTNAME_STRICT: ${KC_HOSTNAME_STRICT:-"false"}
      KC_HEALTH_ENABLED: "true" 
    volumes:
    - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    command: ["start-dev", "--import-realm"]
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/realms/master || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s

  # ── Redis ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru 
    volumes:
      # Persiste los datos de Redis aunque el contenedor se reinicie
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ElasticSearch ─────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── API principal (escalable horizontalmente) ─────────────────────
  # Para escalar: docker compose -f docker-compose.mongo.yml up --scale api=3
  api:
    build: ./api
    # container_name: api
    depends_on:
      mongos:
        condition: service_healthy
      keycloak:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      DB_ENGINE: ${DB_ENGINE:-mongodb}
      MONGO_URL: ${MONGO_URL:-mongodb://mongos:27017/}
      MONGO_DB: ${MONGO_DB:-restaurantdb}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      REALM: ${REALM:-restaurant}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-api-restaurant}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-api-restaurant-secret}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-admin-cli}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      
    # Sin ports aquí: Nginx es el punto de entrada, no la API directamente
    #ports:
     # - "3000:3000"
 
  # ── Microservicio de búsqueda ElasticSearch ───────────────────────
  # Para escalar: docker compose -f docker-compose.mongo.yml up --scale search=2
  search:
    build: ./search-service
   # container_name: search
    depends_on:
      elasticsearch:
        condition: service_healthy
      mongos:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ELASTIC_URL: ${ELASTIC_URL:-http://elasticsearch:9200}
      DB_ENGINE: ${DB_ENGINE:-mongodb}
      MONGO_URL: ${MONGO_URL:-mongodb://mongos:27017/}
      MONGO_DB: ${MONGO_DB:-restaurantdb}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    # Sin ports: Nginx enruta /search/** aquí
    # ports:
     # - "4000:4000"
 
  # ── Nginx — Balanceador de carga ──────────────────────────────────
  nginx:
    image: nginx:alpine
   # container_name: nginx
    depends_on:
      - api
      - search
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.mongo.conf:/etc/nginx/nginx.conf:ro

volumes:
  configsvr1_data:
  configsvr2_data:
  configsvr3_data:
  shard1_primary_data:
  shard1_secondary1_data:
  shard1_secondary2_data:
  redis_data:
  es_data: