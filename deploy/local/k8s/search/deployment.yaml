# search/deployment.yaml
#
# Para minikube: construir primero con
#   docker build -t restaurantes/search:latest ./search-service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search
  namespace: restaurantes
  labels:
    app: search
spec:
  replicas: 2
  selector:
    matchLabels:
      app: search
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:       1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: search
    spec:
      containers:
        - name: search
          image: restaurantes/search:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: restaurantes-config
            - secretRef:
                name: restaurantes-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu:    "100m"
              memory: "128Mi"
            limits:
              cpu:    "300m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: search-service
  namespace: restaurantes
spec:
  selector:
    app: search
  ports:
    - protocol: TCP
      port:       80
      targetPort: 4000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: search-hpa
  namespace: restaurantes
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: search
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70