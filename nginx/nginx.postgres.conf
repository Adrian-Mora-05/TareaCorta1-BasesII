# nginx/nginx.postgres.conf
#
# Idéntico al de Mongo en estructura — el balanceo es agnóstico al motor de BD.
# Se mantiene como archivo separado para permitir configuraciones
# específicas por entorno en el futuro (e.g. SSL, rate limiting diferente).

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  upstream api_backend {
    server api:3000;
    keepalive 32;
  }

  upstream search_backend {
    server search:4000;
    keepalive 16;
  }

  server {
    listen 80;
    server_name localhost;

    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── /api/** → microservicio principal ─────────────────────────
    location /api/ {
      proxy_pass http://api_backend;
    }

    # ── /search/** → microservicio de búsqueda ────────────────────
    location /search/ {
      proxy_pass http://search_backend/;
    }

    # ── Health check ──────────────────────────────────────────────
    location /health {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }
  }
}